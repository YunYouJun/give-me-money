<!doctype html>
<html lang="zh-cmn-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Give me money!</title>
    <link rel="icon" href="favicon.png" type="image/png" />
    <!-- 图标 -->
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#fffaf0" />
    <script>
      ;(function () {
        const lightThemeColor = '#fffaf0'
        const darkThemeColor = '#101817'

        function getStoredColorScheme() {
          try {
            const value = localStorage.getItem('vueuse-color-scheme')
            return value === 'dark' || value === 'light' ? value : 'auto'
          } catch (error) {
            return 'auto'
          }
        }

        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        const setting = getStoredColorScheme()
        const isDark = setting === 'dark' || (prefersDark && setting !== 'light')
        const root = document.documentElement
        const themeColor = document.querySelector('meta[name="theme-color"]')

        root.classList.toggle('dark', isDark)
        root.classList.toggle('light', !isDark)
        root.style.colorScheme = isDark ? 'dark' : 'light'
        if (themeColor) themeColor.setAttribute('content', isDark ? darkThemeColor : lightThemeColor)
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
